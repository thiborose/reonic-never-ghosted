services:
  agent:
    build:
      context: ./agent
    # Provides OPENAI_API_KEY (and optional OPENAI_BASE_URL / VOLTAGENT_MODEL overrides).
    env_file:
      - .env
    environment:
      PORT: "3141"
      VOLTAGENT_MEMORY_URL: file:/app/.voltagent/memory.db
    ports:
      - "3141:3141"
    volumes:
      - agent-data:/app/.voltagent
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3141/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
    environment:
      PORT: "5173"
      # The browser talks only to the web app; the web app calls the agent server-side.
      REONIC_AGENT_URL: http://agent:3141
      # Fail loudly if the live agent call breaks instead of using the deterministic fallback.
      REONIC_AGENT_STRICT: "true"
      REONIC_DEMO_DB: /app/.data/reonic-demo.sqlite
    ports:
      - "5173:5173"
    volumes:
      - web-data:/app/.data
    depends_on:
      agent:
        condition: service_healthy

volumes:
  agent-data:
  web-data:

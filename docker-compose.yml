# Full stack: Postgres + VoltAgent + FastAPI backend + Next.js frontend.
#
#   cp .env.example .env   # put your OPENAI_API_KEY in it
#   docker compose up --build
#   curl -X POST http://localhost:8000/admin/seed   # load demo data (once)
#
# Then open http://localhost:3000.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ng
      POSTGRES_PASSWORD: ng
      POSTGRES_DB: never_ghosted
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ng -d never_ghosted"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build: ./agent
    # OPENAI_API_KEY (+ optional OPENAI_BASE_URL / VOLTAGENT_MODEL) come from .env.
    env_file:
      - .env
    environment:
      PORT: "3141"
      VOLTAGENT_MEMORY_URL: file:/app/.voltagent/memory.db
    ports:
      - "${AGENT_PORT:-3141}:3141"
    volumes:
      - agent-data:/app/.voltagent
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3141/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build: ./backend
    env_file:
      - .env  # OPENAI_API_KEY for the Python fallback engine
    environment:
      # Point at the compose services, not localhost.
      NG_DATABASE_URL: postgresql+psycopg://ng:ng@db:5432/never_ghosted
      REONIC_AGENT_URL: http://agent:3141
      NG_ENGINE: ${NG_ENGINE:-voltagent}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the browser bundle, so it must be host-reachable.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  agent-data:

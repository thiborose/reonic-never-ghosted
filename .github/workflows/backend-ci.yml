name: backend-ci

on:
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check
      - run: uv run pytest

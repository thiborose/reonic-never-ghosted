name: backend-ci

on:
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: ng
          POSTGRES_PASSWORD: ng
          POSTGRES_DB: never_ghosted
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      NG_DATABASE_URL: postgresql+psycopg://ng:ng@localhost:5432/never_ghosted
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check
      - run: uv run pytest
